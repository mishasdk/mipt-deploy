# Single nginx gateway in front of the ML service and the infra UIs.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Grafana -> http://localhost/grafana
    location /grafana/ {
        set $upstream_grafana grafana:3000;
        proxy_pass http://$upstream_grafana;
        include /etc/nginx/proxy_common.conf;
    }
    location = /grafana {
        return 301 /grafana/;
    }

    # MLflow -> http://localhost/mlflow (basic auth)
    location /mlflow {
        auth_basic "MLflow";
        auth_basic_user_file /etc/nginx/.htpasswd;

        set $upstream_mlflow mlflow:5000;
        proxy_pass http://$upstream_mlflow;
        include /etc/nginx/proxy_common.conf;

        client_max_body_size 0;
    }

    # Airflow -> http://localhost/airflow
    location /airflow {
        set $upstream_airflow airflow-webserver:8080;
        proxy_pass http://$upstream_airflow;
        include /etc/nginx/proxy_common.conf;
    }

    # Prometheus -> http://localhost/prometheus (basic auth)
    location /prometheus/ {
        auth_basic "Prometheus";
        auth_basic_user_file /etc/nginx/.htpasswd;

        set $upstream_prometheus prometheus:9090;
        # Strip the /prometheus/ prefix before proxying (route-prefix is /).
        rewrite ^/prometheus/(.*)$ /$1 break;
        proxy_pass http://$upstream_prometheus;
        include /etc/nginx/proxy_common.conf;
    }
    location = /prometheus {
        return 301 /prometheus/;
    }

    # ML inference service at the root (basic auth).
    location / {
        auth_basic "ML Service";
        auth_basic_user_file /etc/nginx/.htpasswd;

        set $upstream_ml_service ml-service:8000;
        proxy_pass http://$upstream_ml_service;
        include /etc/nginx/proxy_common.conf;
    }
}
