services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${MLFLOW_DB_NAME:-mlflow}
      POSTGRES_USER: ${MLFLOW_DB_USER:-mlflow}
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD:-mlflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${MLFLOW_DB_USER:-mlflow}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${MLFLOW_DB_USER:-mlflow}:${MLFLOW_DB_PASSWORD:-mlflow}@postgres:5432/${MLFLOW_DB_NAME:-mlflow}
      AWS_ACCESS_KEY_ID: ${YC_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${YC_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      MLFLOW_S3_BUCKET_NAME: ${MLFLOW_S3_BUCKET_NAME}
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --serve-artifacts
        --artifacts-destination s3://${MLFLOW_S3_BUCKET_NAME}/${MLFLOW_S3_DIR_NAME}
        --disable-security-middleware
    ports:
      - "5001:5000"

volumes:
  postgres_data:
