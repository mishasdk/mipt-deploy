global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/technical.rules.yml

scrape_configs:
  # Inference service. Target is the ml-service container on the compose network.
  - job_name: serving
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-service:8000"]
