# Single nginx gateway in front of the ML service and the infra UIs.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream ml_service { server ml-service:8000; }
upstream mlflow { server mlflow:5000; }
upstream prometheus { server prometheus:9090; }
upstream grafana { server grafana:3000; }
upstream airflow { server airflow-webserver:8080; }

server {
    listen 80;
    server_name _;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Grafana -> http://localhost/grafana
    location /grafana/ {
        proxy_pass http://grafana;
        include /etc/nginx/proxy_common.conf;
    }
    location = /grafana {
        return 301 /grafana/;
    }

    # MLflow -> http://localhost/mlflow (basic auth)
    location /mlflow {
        auth_basic "MLflow";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://mlflow;
        include /etc/nginx/proxy_common.conf;

        client_max_body_size 0;
    }

    # Airflow -> http://localhost/airflow
    location /airflow {
        proxy_pass http://airflow;
        include /etc/nginx/proxy_common.conf;
    }

    # Prometheus -> http://localhost/prometheus (basic auth)
    location /prometheus/ {
        auth_basic "Prometheus";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://prometheus/;
        include /etc/nginx/proxy_common.conf;
    }
    location = /prometheus {
        return 301 /prometheus/;
    }

    # ML inference service at the root (basic auth).
    location / {
        auth_basic "ML Service";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://ml_service;
        include /etc/nginx/proxy_common.conf;
    }
}
